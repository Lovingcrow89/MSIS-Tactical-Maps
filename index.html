<!DOCTYPE html>
<html>
<head>
  <title>MSIS Tactical Maps</title>
  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      color: white;
      font-family: sans-serif;
      display: flex;
    }

    #leftPanel {
      width: 250px;
      padding: 10px;
      background: #111827;
    }

    button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #1f2a44;
      color: white;
      border: none;
      cursor: pointer;
    }

    #gridContainer {
      margin: 20px;
    }
  </style>
</head>
<body>

<div id="leftPanel">

  <button onclick="setMode('unit')">Unit</button>
  <button onclick="setMode('terrain')">Terrain</button>
  <button onclick="setMode('structure')">Structure</button>
  <button onclick="setMode('select')">Select</button>

  <button onclick="generateGrid()">Generate Map</button>

</div>
  
<div id="leftPanel">
  <button onclick="generateGrid()">Generate Map</button>
</div>

<div id="gridContainer"></div>

<script>
function generateGrid() {
  const grid = document.getElementById("gridContainer");

  const rows = 20;
  const cols = 20;
  const size = 30;

  grid.innerHTML = "";
  grid.style.display = "grid";
  grid.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;

  for (let i = 0; i < rows * cols; i++) {
    const tile = document.createElement("div");
    tile.style.width = size + "px";
    tile.style.height = size + "px";
    tile.style.border = "1px solid #1e3a5f";

  tile.onclick = function () {

    if (mode === "unit") {
      tile.style.background = "blue";
    }

    else if (mode === "terrain") {
      tile.style.background = "green";
    }

    else if (mode === "structure") {
      tile.style.background = "gray";
    }

    else if (mode === "select") {
      tile.style.outline = "2px solid yellow";
    }

  };

  grid.appendChild(tile);
  }
}

let mode = "unit";

function setMode(newMode) {
  mode = newMode;
  console.log("Mode:", mode);
}
  
</script>
  
</body>
</html>
