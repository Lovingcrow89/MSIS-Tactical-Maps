<!DOCTYPE html>
<html>
<head>
<title>MSIS Tactical Map</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:sans-serif;
  display:flex;
}

#leftPanel {
  margin:10px;
  width:200px;
}

button, select, input {
  margin:5px 0;
  width:100%;
}

#grid {
  display:grid;
  margin:20px;
}

.tile {
  width:30px;
  height:30px;
  border:1px solid #1f2a44;
  position:relative;
}

.tile:hover {
  background:#1a2440;
}

.unit {
  width:100%;
  height:100%;
  background-size:cover;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="leftPanel">

<h3>Faction</h3>
<input id="factionName" placeholder="Faction name">
<select id="factionColor">
  <option>blue</option>
  <option>red</option>
  <option>green</option>
  <option>yellow</option>
  <option>purple</option>
</select>
<button onclick="addFaction()">Add Faction</button>

<select id="factionSelect"></select>

<h3>Units</h3>
<input type="file" id="unitUpload" multiple>

<h3>Mode</h3>
<button onclick="setMode('unit')">Place Unit</button>
<button onclick="setMode('terrain')">Terrain</button>
<button onclick="setMode('structure')">Structure</button>
<button onclick="setMode('select')">Select</button>
<button onclick="setMode('attack')">Attack Mode</button>

<h3>Info</h3>
<div id="infoPanel" style="display:none;">
<div id="infoText"></div>
HP: <input id="hpInput" type="number"><br>

<div id="weaponSection" style="display:none;">
Weapon:
<select id="weaponSelect"></select>
<button onclick="attackTarget()">Attack</button>
</div>

</div>

</div>

<div id="grid"></div>

<script>

// ===== CORE =====
let gridSize = 20;
let grid = document.getElementById("grid");

let mode = "unit";
let selected = null;
let attacker = null;

function setMode(m){
  mode = m;
  console.log("Mode:", mode);
}

// ===== GRID =====
function createGrid(){
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${gridSize},30px)`;

  for(let i=0;i<gridSize*gridSize;i++){
    let tile = document.createElement("div");
    tile.className = "tile";
    tile.onclick = () => handleClick(tile);
    grid.appendChild(tile);
  }
}
createGrid();

// ===== FACTIONS =====
let factions = [];

function addFaction(){
  let name = document.getElementById("factionName").value;
  let color = document.getElementById("factionColor").value;

  let faction = {name, color};
  factions.push(faction);

  let opt = document.createElement("option");
  opt.value = factions.length-1;
  opt.textContent = name;
  document.getElementById("factionSelect").appendChild(opt);
}

// ===== UNIT IMAGES =====
let uploadedImages = [];

document.getElementById("unitUpload").addEventListener("change", function(e){
  for(let file of e.target.files){
    let reader = new FileReader();
    reader.onload = function(evt){
      uploadedImages.push(evt.target.result);
    };
    reader.readAsDataURL(file);
  }
});

// ===== PLACE UNIT =====
function placeUnit(tile){
  if(tile.firstChild) return;

  let fIndex = document.getElementById("factionSelect").value;
  if(fIndex === "") return;

  let faction = factions[fIndex];

  let div = document.createElement("div");
  div.className = "unit";
  div.dataset.hp = 100;
  div.dataset.faction = faction.name;

  // assign image
  if(uploadedImages.length > 0){
    div.style.backgroundImage = `url(${uploadedImages[0]})`;
  } else {
    div.style.background = faction.color;
  }

  // weapons
  div.dataset.weapons = JSON.stringify([
    "Beam Pistol",
    "Beam Rifle"
  ]);

  tile.appendChild(div);
}

// ===== SELECT =====
function selectObj(tile){
  if(!tile.firstChild) return;

  selected = tile.firstChild;

  document.getElementById("infoPanel").style.display="block";
  document.getElementById("infoText").innerText =
    selected.className + " | " + selected.dataset.faction;

  document.getElementById("hpInput").value = selected.dataset.hp;

  let weaponSection = document.getElementById("weaponSection");
  let weaponSelect = document.getElementById("weaponSelect");

  if(selected.className === "unit"){
    weaponSection.style.display = "block";
    weaponSelect.innerHTML = "";

    let unitWeapons = JSON.parse(selected.dataset.weapons);

    unitWeapons.forEach(w=>{
      let opt = document.createElement("option");
      opt.value = w;
      opt.textContent = w;
      weaponSelect.appendChild(opt);
    });
  } else {
    weaponSection.style.display = "none";
  }
}

// ===== WEAPONS =====
const weapons = {
  "Beam Pistol": {dice:4, count:2, range:6},
  "Beam Rifle": {dice:6, count:1, range:12},
  "Sniper Rifle": {dice:10, count:1, range:18},
  "Gatling": {dice:8, count:4, range:12}
};

// ===== ATTACK =====
function attackTarget(){
  if(!selected) return;
  attacker = selected;
  mode = "attack";
}

// ===== DISTANCE =====
function getTileIndex(el){
  return [...grid.children].indexOf(el.parentElement);
}

function getDistance(a,b){
  let ax = a % gridSize;
  let ay = Math.floor(a/gridSize);
  let bx = b % gridSize;
  let by = Math.floor(b/gridSize);

  return Math.max(Math.abs(ax-bx), Math.abs(ay-by));
}

// ===== COMBAT =====
function resolveAttack(tile){
  if(!attacker || !tile.firstChild) return;

  let target = tile.firstChild;

  let weaponName = document.getElementById("weaponSelect").value;
  let weapon = weapons[weaponName];

  let dist = getDistance(
    getTileIndex(attacker),
    [...grid.children].indexOf(tile)
  );

  if(dist > weapon.range){
    alert("Out of range!");
    return;
  }

  let totalDamage = 0;

  for(let i=0;i<weapon.count;i++){
    let roll = Math.ceil(Math.random()*weapon.dice);
    let threshold = Math.max(1, Math.floor(weapon.dice/2)-1);

    if(roll >= threshold){
      totalDamage += roll;
    }
  }

  target.dataset.hp -= totalDamage;

  if(target.dataset.hp <= 0){
    tile.innerHTML = "";
  }

  mode = "select";
  attacker = null;
}

// ===== CLICK HANDLER =====
function handleClick(tile){
  if(mode==="unit") placeUnit(tile);
  else if(mode==="select") selectObj(tile);
  else if(mode==="attack") resolveAttack(tile);
}

</script>

</body>
</html>
